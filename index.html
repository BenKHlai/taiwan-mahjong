<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣麻雀 - 網頁原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            min-height: 100vh;
            color: white;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .game-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .info-badge {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .opponents {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        
        .opponent {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 15px;
            width: 180px;
            text-align: center;
        }
        
        .opponent-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .opponent-tiles {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-top: 10px;
        }
        
        .tile-back {
            width: 20px;
            height: 28px;
            background: linear-gradient(135deg, #4a90d9 0%, #2c5aa0 100%);
            border-radius: 3px;
            border: 1px solid #1a3a6a;
        }
        
        .table-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .discard-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            max-width: 600px;
        }
        
        .discard-title {
            margin-bottom: 15px;
            opacity: 0.7;
        }
        
        .player-area {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .player-hand {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .tile {
            width: 45px;
            height: 60px;
            background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            user-select: none;
        }
        
        .tile:hover {
            transform: translateY(-8px);
            box-shadow: 2px 8px 10px rgba(0,0,0,0.4);
        }
        
        .tile.selected {
            transform: translateY(-12px);
            box-shadow: 0 12px 15px rgba(0,0,0,0.5);
            border: 2px solid #ffd700;
        }
        
        .tile.wan { color: #c41e3a; }
        .tile.tong { color: #1e90ff; }
        .tile.suo { color: #228b22; }
        .tile.wind { color: #333; }
        .tile.dragon-red { color: #dc143c; }
        .tile.dragon-green { color: #228b22; }
        .tile.dragon-white { color: #666; }
        .tile.flower { 
            background: linear-gradient(180deg, #ffe4e1 0%, #ffc0cb 100%);
            color: #8b008b;
        }
        .tile.joker {
            background: linear-gradient(180deg, #ffd700 0%, #ffb700 100%);
            color: #8b4513;
        }
        
        .tile-small {
            width: 28px;
            height: 38px;
            font-size: 0.7rem;
        }
        
        .melds-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .meld {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .meld-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .flowers-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .message.highlight {
            background: rgba(255, 215, 0, 0.3);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #2d5a3f 0%, #1a472a 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        
        .modal h2 {
            margin-bottom: 20px;
        }
        
        .fan-list {
            text-align: left;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .fan-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .total-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-top: 15px;
        }
        
        .action-panel {
            display: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }
        
        .action-panel.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🀄 台灣麻雀</h1>
            <p>16張牌 · 8隻搭子 · 網頁原型</p>
        </div>
        
        <div class="game-info">
            <div class="info-badge">第 <span id="round">1</span> 圈</div>
            <div class="info-badge">牌牆: <span id="wallCount">0</span></div>
            <div class="info-badge">連莊: <span id="consecutive">0</span></div>
        </div>
        
        <!-- 對手區域 -->
        <div class="opponents">
            <div class="opponent" id="opponent-3">
                <div class="opponent-name">下家 - AI 小明</div>
                <div>牌數: <span class="tile-count">16</span></div>
                <div class="opponent-tiles" id="tiles-3"></div>
            </div>
            <div class="opponent" id="opponent-2">
                <div class="opponent-name">對家 - AI 小華</div>
                <div>牌數: <span class="tile-count">16</span></div>
                <div class="opponent-tiles" id="tiles-2"></div>
            </div>
            <div class="opponent" id="opponent-1">
                <div class="opponent-name">上家 - AI 小強</div>
                <div>牌數: <span class="tile-count">16</span></div>
                <div class="opponent-tiles" id="tiles-1"></div>
            </div>
        </div>
        
        <!-- 牌桌區域 -->
        <div class="table-area">
            <div class="discard-title">棄牌區</div>
            <div class="discard-area" id="discardArea"></div>
        </div>
        
        <!-- 玩家區域 -->
        <div class="player-area">
            <div class="flowers-area" id="flowersArea">
                <span>花牌: </span>
            </div>
            <div class="melds-area" id="meldsArea"></div>
            <div class="player-hand" id="playerHand"></div>
            
            <div class="message" id="message">點擊「開始遊戲」</div>
            
            <!-- 行動面板 -->
            <div class="action-panel" id="actionPanel">
                <span id="actionText">你可以：</span>
                <div class="controls">
                    <button class="btn btn-primary" id="btnChow" onclick="doAction('chow')">吃</button>
                    <button class="btn btn-primary" id="btnPong" onclick="doAction('pong')">碰</button>
                    <button class="btn btn-primary" id="btnKong" onclick="doAction('kong')">槓</button>
                    <button class="btn btn-danger" id="btnHu" onclick="doAction('hu')">胡！</button>
                    <button class="btn btn-secondary" onclick="doAction('pass')">過</button>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="btnDraw" onclick="drawTile()" disabled>摸牌</button>
                <button class="btn btn-secondary" id="btnDiscard" onclick="discardTile()" disabled>打牌</button>
                <button class="btn btn-primary" onclick="startGame()">開始遊戲</button>
            </div>
        </div>
    </div>
    
    <!-- 結果彈窗 -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2 id="resultTitle">遊戲結束！</h2>
            <div class="fan-list" id="fanList"></div>
            <div class="total-score" id="totalScore"></div>
            <div class="controls" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="startGame()">再來一局</button>
                <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
