<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣麻雀 - 16張牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
            background: linear-gradient(135deg, #0d3320 0%, #1a5438 50%, #0d3320 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 頂部信息 */
        .header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 15px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }
        
        .game-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        .info-badge {
            background: rgba(0,0,0,0.4);
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .info-badge span {
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 對手區域 */
        .opponents-area {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .opponent {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            min-width: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .opponent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .opponent-name {
            font-weight: bold;
            font-size: 1rem;
        }
        
        .opponent-tile-count {
            background: rgba(255,215,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .opponent-tiles {
            display: flex;
            gap: 2px;
            margin-top: 5px;
        }
        
        .opponent-melds {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .meld-group {
            display: flex;
            gap: 1px;
            background: rgba(0,0,0,0.3);
            padding: 3px;
            border-radius: 4px;
        }
        
        .meld-label {
            font-size: 0.7rem;
            color: #ffd700;
            margin-right: 4px;
        }
        
        /* 牌桌區域 */
        .table-area {
            flex: 1;
            background: radial-gradient(ellipse at center, #1a5438 0%, #0d3320 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 4px solid #8B4513;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3), 0 5px 20px rgba(0,0,0,0.5);
            position: relative;
            min-height: 250px;
        }
        
        .table-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        .discard-title {
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .discard-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            max-width: 90%;
        }
        
        /* 牌的樣式 - 全新設計 */
        .tile {
            width: 42px;
            height: 58px;
            background: linear-gradient(180deg, #fff 0%, #f8f8f0 30%, #e8e8e0 100%);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 
                2px 2px 4px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.8),
                inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            user-select: none;
            border: 1px solid #ccc;
        }
        
        .tile::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 100%);
            border-radius: 3px 3px 0 0;
        }
        
        .tile:hover {
            transform: translateY(-6px);
            box-shadow: 
                2px 8px 12px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.8),
                inset 0 -1px 0 rgba(0,0,0,0.1);
        }
        
        .tile.selected {
            transform: translateY(-15px);
            box-shadow: 
                0 15px 20px rgba(255,215,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.8);
            border: 2px solid #ffd700;
        }
        
        .tile-small {
            width: 28px;
            height: 38px;
            font-size: 0.7rem;
        }
        
        .tile-back {
            width: 24px;
            height: 34px;
            background: linear-gradient(135deg, #1e5f3f 0%, #0d3320 100%);
            border-radius: 4px;
            border: 1px solid #0a2618;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .tile-back::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(255,255,255,0.05) 3px,
                rgba(255,255,255,0.05) 6px
            );
            border-radius: 2px;
        }
        
        /* 牌的顏色 */
        .tile.wan { color: #c41e3a; }
        .tile.tong { color: #1e88e5; }
        .tile.suo { color: #2e7d32; }
        .tile.wind { color: #212121; }
        .tile.dragon-red { color: #d32f2f; background: linear-gradient(180deg, #ffcdd2 0%, #fff 30%, #ffebee 100%); }
        .tile.dragon-green { color: #388e3c; background: linear-gradient(180deg, #c8e6c9 0%, #fff 30%, #e8f5e9 100%); }
        .tile.dragon-white { color: #616161; }
        .tile.flower { 
            background: linear-gradient(180deg, #fce4ec 0%, #fff 30%, #f8bbd9 100%);
            color: #ad1457;
        }
        .tile.joker {
            background: linear-gradient(180deg, #fff8e1 0%, #ffecb3 50%, #ffd54f 100%);
            color: #e65100;
            border: 2px solid #ff8f00;
            font-weight: 900;
        }
        
        .tile .tile-text {
            position: relative;
            z-index: 1;
            font-size: 0.85rem;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.8);
        }
        
        .tile.joker .tile-text,
        .tile.flower .tile-text {
            text-shadow: none;
        }
        
        /* 玩家區域 */
        .player-area {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.2);
        }
        
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        
        .flowers-jokers {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .flowers-jokers .section {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .section-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }
        
        .player-melds {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            min-height: 45px;
        }
        
        .meld-set {
            display: flex;
            gap: 2px;
            background: rgba(255,215,0,0.1);
            padding: 4px 8px;
            border-radius: 8px;
            align-items: center;
        }
        
        .meld-set .meld-type {
            font-size: 0.75rem;
            color: #ffd700;
            margin-right: 5px;
            min-width: 20px;
        }
        
        .player-hand {
            display: flex;
            justify-content: center;
            gap: 3px;
            flex-wrap: wrap;
            padding: 10px 0;
            min-height: 70px;
        }
        
        .message-box {
            text-align: center;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            font-size: 1rem;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .message-box.highlight {
            background: rgba(255,215,0,0.2);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 控制按鈕 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(76,175,80,0.3);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #c62828 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #e65100 100%);
            color: white;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 行動面板 */
        .action-panel {
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            border-radius: 15px;
            margin-top: 10px;
            border: 2px solid #ffd700;
        }
        
        .action-panel.active {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .action-panel .action-text {
            text-align: center;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a5438 0%, #0d3320 100%);
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            border: 3px solid #ffd700;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .modal h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .fan-list {
            text-align: left;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .fan-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .fan-item:last-child {
            border-bottom: none;
        }
        
        .total-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-top: 15px;
        }
        
        /* 響應式 */
        @media (max-width: 768px) {
            .opponents-area {
                flex-direction: column;
                align-items: center;
            }
            
            .opponent {
                width: 100%;
                max-width: 300px;
            }
            
            .tile {
                width: 36px;
                height: 50px;
                font-size: 0.8rem;
            }
            
            .tile-small {
                width: 24px;
                height: 34px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 頂部 -->
        <div class="header">
            <h1>🀄 台灣麻雀</h1>
            <div class="game-info">
                <div class="info-badge">第 <span id="round">1</span> 圈</div>
                <div class="info-badge">牌牆: <span id="wallCount">0</span></div>
                <div class="info-badge">連莊: <span id="consecutive">0</span></div>
            </div>
        </div>
        
        <!-- 對手區 -->
        <div class="opponents-area">
            <div class="opponent" id="opponent-1">
                <div class="opponent-header">
                    <span class="opponent-name">AI 小強</span>
                    <span class="opponent-tile-count"><span class="tile-count">16</span> 張</span>
                </div>
                <div class="opponent-tiles" id="tiles-1"></div>
                <div class="opponent-melds" id="melds-1"></div>
            </div>
            <div class="opponent" id="opponent-2">
                <div class="opponent-header">
                    <span class="opponent-name">AI 小華</span>
                    <span class="opponent-tile-count"><span class="tile-count">16</span> 張</span>
                </div>
                <div class="opponent-tiles" id="tiles-2"></div>
                <div class="opponent-melds" id="melds-2"></div>
            </div>
            <div class="opponent" id="opponent-3">
                <div class="opponent-header">
                    <span class="opponent-name">AI 小明</span>
                    <span class="opponent-tile-count"><span class="tile-count">16</span> 張</span>
                </div>
                <div class="opponent-tiles" id="tiles-3"></div>
                <div class="opponent-melds" id="melds-3"></div>
            </div>
        </div>
        
        <!-- 牌桌 -->
        <div class="table-area">
            <div class="table-center">
                <div class="discard-title">棄牌區</div>
                <div class="discard-area" id="discardArea"></div>
            </div>
        </div>
        
        <!-- 玩家區 -->
        <div class="player-area">
            <div class="player-info">
                <div class="flowers-jokers">
                    <div class="section" id="flowersSection" style="display:none;">
                        <span class="section-label">花:</span>
                        <span id="flowersDisplay"></span>
                    </div>
                </div>
            </div>
            
            <div class="player-melds" id="playerMelds"></div>
            
            <div class="player-hand" id="playerHand"></div>
            
            <div class="message-box" id="message">點擊「開始遊戲」</div>
            
            <div class="action-panel" id="actionPanel">
                <div class="action-text">你可以：</div>
                <div class="controls">
                    <button class="btn btn-warning" id="btnChow" onclick="doAction('chow')">吃</button>
                    <button class="btn btn-warning" id="btnPong" onclick="doAction('pong')">碰</button>
                    <button class="btn btn-warning" id="btnKong" onclick="doAction('kong')">槓</button>
                    <button class="btn btn-danger" id="btnHu" onclick="doAction('hu')">胡！</button>
                    <button class="btn btn-secondary" onclick="doAction('pass')">過</button>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="btnDraw" onclick="drawTile()" disabled>摸牌</button>
                <button class="btn btn-secondary" id="btnDiscard" onclick="discardTile()" disabled>打牌</button>
                <button class="btn btn-primary" onclick="startGame()">開始遊戲</button>
            </div>
        </div>
    </div>
    
    <!-- 結果彈窗 -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2 id="resultTitle">遊戲結束！</h2>
            <div class="fan-list" id="fanList"></div>
            <div class="total-score" id="totalScore"></div>
            <div class="controls" style="margin-top: 25px;">
                <button class="btn btn-primary" onclick="startGame()">再來一局</button>
                <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
